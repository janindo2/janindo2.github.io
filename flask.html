from flask import Flask
import random

app = Flask(__name__)
app.config['DEBUG'] = True

@app.route('/')
def hello():
   page = """
      <h1>Here's a random number: {0}</h1>
      <form>
         <button>New Number</button>
      </form>
   """
   num = random.randint(1, 25)
   return page.format(num)

@app.route('/goodbye')
def goodbye():
   return "<h2>This is the second page!</h2>"
